<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .prod-wrap { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); background:var(--mid); margin:24px 0; }
    .prod-gallery { position:relative; min-height:480px; background:linear-gradient(135deg,#1a0005,#111); border-right:1px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .prod-gallery img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .prod-gallery-ph { font-family:'Anton',sans-serif; font-size:80px; color:rgba(232,0,29,0.15); letter-spacing:4px; }
    .prod-badge-sale { position:absolute; top:16px; left:16px; background:var(--red); font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:4px 12px; z-index:2; }
    .prod-info { padding:40px; display:flex; flex-direction:column; }
    .prod-breadcrumb { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
    .prod-breadcrumb a { color:var(--muted); text-decoration:none; }
    .prod-breadcrumb a:hover { color:var(--red); }
    .prod-cat { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--red); margin-bottom:8px; }
    .prod-name { font-family:'Anton',sans-serif; font-size:48px; line-height:1; letter-spacing:1px; margin-bottom:12px; }
    .prod-desc { font-size:14px; color:var(--muted); line-height:1.8; margin-bottom:24px; }
    .prod-price { font-family:'Anton',sans-serif; font-size:42px; color:white; display:flex; align-items:baseline; gap:12px; margin-bottom:6px; }
    .prod-price-old { font-size:22px; color:var(--muted); text-decoration:line-through; }
    .prod-ship { font-size:13px; color:#16a34a; margin-bottom:24px; }
    .prod-label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .tallas-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .talla-btn { min-width:48px; height:48px; padding:0 10px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; }
    .talla-btn:hover,.talla-btn.active { border-color:var(--red); color:var(--red); background:rgba(232,0,29,0.05); }
    .colores-grid { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
    .color-opt { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
    .color-swatch { width:32px; height:32px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); transition:all .2s; }
    .color-opt.active .color-swatch { border-color:white; transform:scale(1.15); }
    .color-opt-label { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .prod-qty { display:flex; align-items:center; gap:0; margin-bottom:24px; border:1px solid var(--border); width:fit-content; }
    .qty-btn { width:44px; height:44px; background:transparent; border:none; color:white; font-size:20px; cursor:pointer; transition:background .2s; display:flex; align-items:center; justify-content:center; }
    .qty-btn:hover { background:rgba(255,255,255,0.08); }
    .qty-val { width:44px; height:44px; border-left:1px solid var(--border); border-right:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:16px; font-weight:700; }
    .prod-actions { display:flex; gap:10px; flex-direction:column; }
    .btn-add { background:var(--red); color:white; border:none; padding:16px 32px; font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background .2s; }
    .btn-add:hover { background:#c0001a; }
    .btn-cart { background:transparent; color:white; border:1px solid var(--border); padding:16px 32px; font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s; text-decoration:none; display:block; text-align:center; }
    .btn-cart:hover { border-color:var(--red); color:var(--red); }
    .prod-details { border-top:1px solid var(--border); padding-top:20px; margin-top:auto; }
    .prod-detail-row { display:flex; gap:8px; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .prod-detail-label { color:#555; width:80px; flex-shrink:0; }
    .cart-nav { position:relative; display:flex; align-items:center; text-decoration:none; color:white; font-size:20px; }
    .cart-nav-count { position:absolute; top:-8px; right:-8px; background:#E8001D; color:white; font-size:10px; font-weight:700; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    @media(max-width:768px){
      .prod-wrap{grid-template-columns:1fr;}
      .prod-gallery{min-height:280px;border-right:none;border-bottom:1px solid var(--border);}
      .prod-info{padding:20px 16px;}
      .prod-name{font-size:32px;}
      .prod-price{font-size:32px;}
    }
  </style>
</head>
<body>
<header style="background:#000000;border-bottom:1px solid #1E1E1E;position:sticky;top:0;z-index:200;">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <nav style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;"><img src="logo.svg" alt="FightMFL" style="height:30px;width:auto;display:block;"></a>
      <div id="nav-desktop" style="display:flex;gap:28px;align-items:center;">
        <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Inicio</a>
        <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Eventos</a>
        <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Peleadores</a>
        <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Noticias</a>
        <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Tienda</a>
        <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;font-weight:700;">Quiero Pelear</a>
        <a href="carrito.html" class="cart-nav"><span class="cart-nav-count" id="cart-count" style="display:none">0</span></a>
      </div>
      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;" onclick="toggleMenu()">
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
      </button>
    </nav>
  </div>
</header>
<style>@media(max-width:768px){#nav-desktop{display:none!important;}#hamburger-btn{display:flex!important;}}</style>
<script>function toggleMenu(){}</script>

<div class="page" id="page-content">
  <div style="color:var(--muted);font-family:'Oswald',sans-serif;text-align:center;padding:80px;letter-spacing:1px;">Cargando producto...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
let prod=null, talla=null, color=null, qty=1, cfg={}

function getCart(){return JSON.parse(localStorage.getItem('mfl_cart')||'[]')}
function saveCart(c){localStorage.setItem('mfl_cart',JSON.stringify(c));updateCount()}
function updateCount(){
  const n=getCart().reduce((s,i)=>s+i.cantidad,0)
  const el=document.getElementById('cart-count')
  if(el){el.textContent=n;el.style.display=n>0?'flex':'none'}
}
function toast(msg,type='green'){
  const t=document.createElement('div')
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:${type==='green'?'#16a34a':'#E8001D'};color:white;padding:14px 24px;font-family:Barlow Condensed,sans-serif;font-size:14px;letter-spacing:1px;z-index:9999;`
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)
}
updateCount()

async function main(){
  const id=new URLSearchParams(location.search).get('id')
  if(!id){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:80px;color:var(--muted);font-family:Barlow Condensed,sans-serif;">Producto no encontrado. <a href="tienda.html" style="color:var(--red)">← Volver a la tienda</a></div>';return}

  const [r1,r2]=await Promise.all([
    db.from('tienda_config').select('*'),
    db.from('productos').select('*,categorias(nombre)').eq('id',id).single()
  ])
  if(r1.data)r1.data.forEach(r=>cfg[r.clave]=r.valor)
  prod=r2.data
  if(!prod){document.getElementById('page-content').innerHTML='<div style="text-align:center;padding:80px;color:var(--muted);font-family:Barlow Condensed,sans-serif;">Producto no encontrado. <a href="tienda.html" style="color:var(--red)">← Volver a la tienda</a></div>';return}

  const sym=cfg.simbolo||'$'
  const prec=prod.precio_oferta?+prod.precio_oferta:+prod.precio
  const pct=prod.precio_oferta?Math.round((1-prod.precio_oferta/prod.precio)*100):0

  document.title=prod.nombre+' | FightMFL'
  document.getElementById('page-content').innerHTML=`
  <div class="prod-wrap">
    <div class="prod-gallery">
      ${prod.precio_oferta?`<div class="prod-badge-sale">${pct}% OFF</div>`:''}
      ${prod.imagen?`<img src="${prod.imagen}" alt="${prod.nombre}">`:`<div class="prod-gallery-ph">MFL</div>`}
    </div>
    <div class="prod-info">
      <div class="prod-breadcrumb"><a href="tienda.html">Tienda</a> / ${prod.categorias?.nombre||'Merch'}</div>
      <div class="prod-cat">${prod.categorias?.nombre||'Merch MFL'}</div>
      <div class="prod-name">${prod.nombre}</div>
      ${prod.descripcion?`<div class="prod-desc">${prod.descripcion}</div>`:prod.descripcion_corta?`<div class="prod-desc">${prod.descripcion_corta}</div>`:''}

      <div class="prod-price">
        ${sym}${prec.toFixed(2)}
        ${prod.precio_oferta?`<span class="prod-price-old">${sym}${(+prod.precio).toFixed(2)}</span>`:''}
      </div>
      ${prod.envio_gratis?'<div class="prod-ship">Este producto incluye envío gratis</div>':''}

      ${prod.tallas?.length?`
      <div class="prod-label">Talla — <span id="talla-sel" style="color:white">Selecciona</span></div>
      <div class="tallas-grid">${prod.tallas.map(t=>`<div class="talla-btn" onclick="selTalla(this,'${t}')">${t}</div>`).join('')}</div>`:''}

      ${prod.colores?.length?`
      <div class="prod-label">Color — <span id="color-sel" style="color:white">Selecciona</span></div>
      <div class="colores-grid">${prod.colores.map(c=>`
        <div class="color-opt" onclick="selColor(this,'${c.nombre}','${c.hex}')">
          <div class="color-swatch" style="background:${c.hex}"></div>
          <div class="color-opt-label">${c.nombre}</div>
        </div>`).join('')}</div>`:''}

      <div class="prod-label">Cantidad</div>
      <div class="prod-qty">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-val" id="qty-val">1</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>

      <div class="prod-actions">
        <button class="btn-add" onclick="addCart()">Agregar al carrito</button>
        <a href="carrito.html" class="btn-cart">Ver carrito →</a>
      </div>

      <div class="prod-details">
        ${prod.sku?`<div class="prod-detail-row"><span class="prod-detail-label">SKU</span>${prod.sku}</div>`:''}
        <div class="prod-detail-row"><span class="prod-detail-label">Stock</span>${prod.stock>0?prod.stock+' disponibles':'Agotado'}</div>
        <div class="prod-detail-row"><span class="prod-detail-label">Envío</span>${prod.envio_gratis?'Gratis':'${cfg.costo_envio||99} MXN'}</div>
      </div>
    </div>
  </div>

  <div class="section-label">También te puede interesar</div>
  <div class="products-grid" id="relacionados" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>

  <footer>
    <a class="footer-logo" href="index.html" style="display:inline-flex;align-items:center;"><img src="logo.svg" alt="FightMFL" style="height:22px;width:auto;display:block;"></a>
    <div class="footer-links"><a href="#">Instagram</a><a href="#">YouTube</a><a href="#">Contacto</a></div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>`

  // Relacionados
  const {data:rel}=await db.from('productos').select('*,categorias(nombre)').eq('activo',true).neq('id',id).eq('categoria_id',prod.categoria_id||'').limit(3)
  const sym2=cfg.simbolo||'$'
  if(rel?.length){
    document.getElementById('relacionados').innerHTML=rel.map(p=>{
      const pr=p.precio_oferta?+p.precio_oferta:+p.precio
      return `<a href="producto.html?id=${p.id}" style="background:var(--mid);border:1px solid var(--border);text-decoration:none;color:var(--light);display:block;">
        <div style="height:160px;background:linear-gradient(135deg,#1a0005,#111);overflow:hidden;display:flex;align-items:center;justify-content:center;">
          ${p.imagen?`<img src="${p.imagen}" style="width:100%;height:100%;object-fit:cover;" alt="">`:`<span style="font-family:'Anton',sans-serif;font-size:40px;color:rgba(232,0,29,0.2);">MFL</span>`}
        </div>
        <div style="padding:12px 14px;">
          <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;">${p.nombre}</div>
          <div style="font-family:'Anton',sans-serif;font-size:20px;margin-top:4px;">${sym2}${pr.toFixed(2)}</div>
        </div>
      </a>`
    }).join('')
  }
}

function selTalla(el,t){document.querySelectorAll('.talla-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');talla=t;document.getElementById('talla-sel').textContent=t}
function selColor(el,n,h){document.querySelectorAll('.color-opt').forEach(d=>d.classList.remove('active'));el.classList.add('active');color={nombre:n,hex:h};document.getElementById('color-sel').textContent=n}
function changeQty(d){qty=Math.max(1,Math.min(10,qty+d));document.getElementById('qty-val').textContent=qty}

function addCart(){
  if(!prod)return
  if(prod.tallas?.length&&!talla){toast('Selecciona una talla','red');return}
  if(prod.colores?.length&&!color){toast('Selecciona un color','red');return}
  const cart=getCart()
  const key=prod.id+'-'+(talla||'')+'-'+(color?.nombre||'')
  const ex=cart.find(i=>i.key===key)
  if(ex)ex.cantidad+=qty
  else cart.push({key,id:prod.id,nombre:prod.nombre,precio:+(prod.precio_oferta||prod.precio),imagen:prod.imagen||'',talla:talla||'',color:color?.nombre||'',color_hex:color?.hex||'',cantidad:qty})
  saveCart(cart)
  toast(''+prod.nombre+' agregado al carrito')
}

main()
</script>
</body>
</html>
