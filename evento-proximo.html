<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFL 8 — Cartelera | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* HERO EVENTO */
    .event-hero { position: relative; min-height: 520px; display: flex; align-items: flex-end; overflow: hidden; border: 1px solid var(--border); margin: 24px 0 0; }
    .event-hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a0005 60%, #0a0a0a 100%); }
    .event-hero-pattern { position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(232,0,29,0.03) 40px,rgba(232,0,29,0.03) 80px); }
    .event-hero-fighters { position: absolute; right: 0; top: 0; bottom: 0; width: 58%; display: flex; align-items: flex-end; justify-content: center; gap: 0; }
    .hero-fighter-wrap { display: flex; flex-direction: column; align-items: center; }
    .hero-fighter-wrap.right { transform: scaleX(-1); }
    .hero-silhouette { width: 260px; height: 440px; }
    .hero-vs-center { font-family: 'Unica One', sans-serif; font-size: 52px; color: var(--red); z-index: 3; text-shadow: 0 0 40px rgba(232,0,29,0.5); margin-bottom: 40px; position: relative; align-self: center; }
    .hero-fighter-name { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; text-align: center; }
    .hero-fighter-flag { font-size: 20px; }
    .event-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 30%, rgba(0,0,0,0.2) 70%, transparent 100%); z-index: 1; }
    .event-hero-content { position: relative; z-index: 2; padding: 36px 40px; max-width: 55%; }
    .eh-nav { display: flex; gap: 16px; margin-bottom: 20px; }
    .eh-nav a { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; }
    .eh-nav a:hover { color: white; }
    .eh-nav span { color: #333; }
    .eh-tag { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .eh-title { font-family: 'Unica One', sans-serif; font-size: 64px; line-height: 1; letter-spacing: 2px; }
    .eh-title span { color: var(--red); }
    .eh-fight { font-family: 'Oswald', sans-serif; font-size: 20px; color: #ccc; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
    .eh-meta { font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin: 14px 0 20px; border-left: 2px solid var(--red); padding-left: 10px; line-height: 1.8; }
    .eh-btns { display: flex; gap: 8px; }

    /* NAVEGACION EVENTO */
    .event-nav { display: flex; border-bottom: 1px solid var(--border); margin: 28px 0 0; }
    .event-tab { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 24px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
    .event-tab.active { color: white; border-bottom-color: var(--red); }
    .event-tab:hover:not(.active) { color: #ccc; }

    /* COMO VER */
    .how-to-watch { background: var(--mid); border: 1px solid var(--border); padding: 16px 20px; margin: 20px 0; display: flex; align-items: center; gap: 20px; }
    .htw-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .htw-divider { width: 1px; height: 30px; background: var(--border); }
    .htw-times { display: flex; gap: 24px; flex: 1; }
    .htw-time { }
    .htw-time-label { font-family: 'Oswald', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .htw-time-val { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; color: white; margin-top: 2px; }

    /* PELEA ESTELAR */
    .fight-featured { cursor: pointer; background: var(--mid); border: 1px solid var(--border); border-left: 3px solid var(--red); margin-bottom: 6px; overflow: hidden; }
    .fight-featured-inner { padding: 28px 32px; }
    .ff-badge { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .ff-matchup { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; }
    .ff-fighter { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; }
    .ff-av { width: 100px; height: 100px; border-radius: 50%; background: #1a1a1a; border: 2px solid #252525; display: flex; align-items: center; justify-content: center; font-family: 'Unica One', sans-serif; font-size: 30px; color: #444; }
    .ff-av.red { border-color: rgba(232,0,29,0.4); }
    .ff-flag { font-size: 22px; }
    .ff-name { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
    .ff-nick { font-size: 13px; color: var(--red); font-style: italic; }
    .ff-record { font-size: 12px; color: var(--muted); }
    .ff-ranking { font-family: 'Oswald', sans-serif; font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
    .ff-vs { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ff-vs-text { font-family: 'Unica One', sans-serif; font-size: 44px; color: var(--red); }
    .ff-weight { font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .ff-rounds { font-family: 'Oswald', sans-serif; font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; }

    /* PELEA CO-ESTELAR */
    .fight-co { background: var(--mid); border: 1px solid var(--border); margin-bottom: 6px; }
    .fight-co-inner { padding: 22px 28px; }
    .fc-badge { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .fc-matchup { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
    .fc-fighter { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
    .fc-av { width: 72px; height: 72px; border-radius: 50%; background: #1a1a1a; border: 2px solid #252525; display: flex; align-items: center; justify-content: center; font-family: 'Unica One', sans-serif; font-size: 20px; color: #444; }
    .fc-name { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
    .fc-record { font-size: 11px; color: var(--muted); }
    .fc-vs { font-family: 'Unica One', sans-serif; font-size: 28px; color: var(--red); }
    .fc-weight { font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

    /* PELEA NORMAL */
    .fight-row { background: var(--mid); border: 1px solid var(--border); margin-bottom: 4px; }
    .fight-row-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; padding: 16px 20px; }
    .fr-fighter { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 5px; }
    .fr-av { width: 52px; height: 52px; border-radius: 50%; background: #1a1a1a; border: 2px solid #252525; display: flex; align-items: center; justify-content: center; font-family: 'Unica One', sans-serif; font-size: 15px; color: #444; }
    .fr-name { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
    .fr-record { font-size: 11px; color: var(--muted); }
    .fr-vs { font-family: 'Unica One', sans-serif; font-size: 20px; color: #2a2a2a; }
    .fr-weight { font-family: 'Oswald', sans-serif; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; display: block; margin-top: 2px; }

    /* PRELIMS */
    .prelim-row { background: var(--mid); border: 1px solid var(--border); margin-bottom: 4px; }
    .prelim-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; padding: 12px 20px; }
    .pr-fighter { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px; }
    .pr-av { width: 42px; height: 42px; border-radius: 50%; background: #1a1a1a; border: 2px solid #1e1e1e; display: flex; align-items: center; justify-content: center; font-family: 'Unica One', sans-serif; font-size: 12px; color: #333; }
    .pr-name { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; color: #aaa; }
    .pr-record { font-size: 10px; color: var(--muted); }
    .pr-vs { font-family: 'Unica One', sans-serif; font-size: 16px; color: #222; }
    .pr-weight { font-family: 'Oswald', sans-serif; font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 1px; text-align: center; display: block; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* PANEL DESPLEGABLE */
    .fight-panel { cursor: pointer; position: relative; }
    .fight-panel::after { content: '+ VER STATS'; font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); position: absolute; bottom: 10px; right: 16px; transition: color .2s; }
    .fight-panel.open::after { content: '— CERRAR'; color: var(--red); }
    .fight-panel:hover::after { color: white; }
    .stats-drawer { display: none; border-top: 1px solid var(--border); background: #0f0f0f; }
    .stats-drawer.open { display: block; }
    .drawer-inner { padding: 20px 28px; }
    .drawer-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; }
    .drawer-fighter-name { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; }
    .drawer-fighter-name.red { color: #ff6b6b; }
    .drawer-fighter-name.blue { color: #7ab3ff; text-align: right; }
    .drawer-stat { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .drawer-stat:last-child { border-bottom: none; }
    .dval { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; }
    .dval.r { color: #ff6b6b; }
    .dval.b { color: #7ab3ff; text-align: right; }
    .dlabel { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; }
    .drawer-bar { display: flex; height: 4px; margin: 8px 0; border-radius: 2px; overflow: hidden; }
    .drawer-bar-r { background: var(--red); border-radius: 2px 0 0 2px; }
    .drawer-bar-b { background: #1a6ef5; border-radius: 0 2px 2px 0; }
    .drawer-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #1a1a1a; }
    .view-full { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); text-align: center; text-decoration: none; display: block; margin-top: 14px; }
    .view-full:hover { color: white; }

    @media(max-width:768px) {
      .fight-panel::after { font-size: 9px; bottom: 8px; right: 12px; }
      .drawer-inner { padding: 14px 16px; }
      .dval { font-size: 13px; }
      .dlabel { font-size: 9px; }
    }

  </style>

  <style id="mobile-ep">
  @media (max-width: 768px) {
    .event-hero { min-height: 420px; }
    .event-hero-content { max-width: 100%; padding: 20px 16px 30px; }
    .event-hero-fighters { width: 100%; opacity: 0.15; }
    .hero-silhouette { width: 160px; height: 260px; }
    .hero-vs-center { font-size: 32px; margin-bottom: 20px; }
    .eh-title { font-size: 44px; }
    .eh-fight { font-size: 15px; }
    .eh-btns { flex-wrap: wrap; gap: 8px; }
    .how-to-watch { flex-direction: column; align-items: flex-start; gap: 12px; }
    .htw-times { flex-direction: column; gap: 10px; }
    .htw-divider { display: none; }
    .ff-matchup { gap: 8px; }
    .ff-av { width: 60px; height: 60px; font-size: 18px; }
    .ff-name { font-size: 14px; }
    .ff-vs-text { font-size: 28px; }
    .fc-matchup { gap: 6px; }
    .fc-av { width: 46px; height: 46px; font-size: 14px; }
    .fight-featured-inner { padding: 16px; }
    .fight-co-inner { padding: 14px; }
    .event-nav { overflow-x: auto; }
  }
  </style>
</head>

  <!-- CARTELERA DINÁMICA -->
  <div id="cartelera-root" style="padding:24px 0;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:1px;">Cargando cartelera...</div>
  <footer>
    <a class="footer-logo" href="index.html" style="display:inline-flex;align-items:center;"><img src="logo.svg" alt="FightMFL" style="height:22px;width:auto;display:block;"></a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  const TIPO_LABEL = { estelar:'Pelea Estelar', coestelar:'Co-Estelar', principal:'Cartelera Principal', preliminar:'Preliminar', tbd:'Por Anunciar' };
  const PRIO = { estelar:0, coestelar:1, principal:2, preliminar:3, tbd:4 };
  const ini = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const rec = p => p ? `${p.record_g}-${p.record_p}-${p.record_e}` : '—';
  const flag = p => `${p?.pais || '🏳️'}`;
  function av(p, cls) {
    if (p && p.foto_url) return `<div class="${cls}" style="overflow:hidden;padding:0"><img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover" alt="${p.nombre||''}"></div>`;
    return `<div class="${cls}">${ini(p && p.nombre)}</div>`;
  }

  function featured(p) {
    const a = p.peleador1, b = p.peleador2;
    return `<a href="pelea.html?id=${p.id}" style="text-decoration:none;color:inherit;display:block;"><div class="fight-featured"><div class="fight-featured-inner">
      <div class="ff-badge">${TIPO_LABEL[p.tipo]||p.tipo} · ${p.rounds||3} Rounds · ${p.peso_lbs||''} lbs</div>
      <div class="ff-matchup">
        <div class="ff-fighter">${av(a,'ff-av red')}<div class="ff-flag">${flag(a)}</div><div class="ff-name">${a?.nombre||'TBA'}</div>${a?.apodo?`<div class="ff-nick">"${a.apodo}"</div>`:''}<div class="ff-record">${rec(a)}</div></div>
        <div class="ff-vs"><div class="ff-vs-text">VS</div><div class="ff-weight">${p.peso_lbs||''} lbs</div><div class="ff-rounds">${p.rounds||3} rounds</div></div>
        <div class="ff-fighter">${av(b,'ff-av')}<div class="ff-flag">${flag(b)}</div><div class="ff-name">${b?.nombre||'TBA'}</div>${b?.apodo?`<div class="ff-nick">"${b.apodo}"</div>`:''}<div class="ff-record">${rec(b)}</div></div>
      </div>
    </div></div></a>`;
  }

  function co(p) {
    const a = p.peleador1, b = p.peleador2;
    return `<a href="pelea.html?id=${p.id}" style="text-decoration:none;color:inherit;display:block;"><div class="fight-co"><div class="fight-co-inner">
      <div class="fc-badge">${TIPO_LABEL[p.tipo]||p.tipo} · ${p.rounds||3} Rounds · ${p.peso_lbs||''} lbs</div>
      <div class="fc-matchup">
        <div class="fc-fighter">${av(a,'fc-av')}<div class="ff-flag">${flag(a)}</div><div class="fc-name">${a?.nombre||'TBA'}</div><div class="fc-record">${rec(a)}</div></div>
        <div style="text-align:center"><div class="fc-vs">VS</div><div class="fc-weight">${p.peso_lbs||''} lbs</div></div>
        <div class="fc-fighter">${av(b,'fc-av')}<div class="ff-flag">${flag(b)}</div><div class="fc-name">${b?.nombre||'TBA'}</div><div class="fc-record">${rec(b)}</div></div>
      </div>
    </div></div></a>`;
  }

  function row(p) {
    const a = p.peleador1, b = p.peleador2;
    return `<a href="pelea.html?id=${p.id}" style="text-decoration:none;color:inherit;display:block;"><div class="fight-row"><div class="fight-row-inner">
      <div class="fr-fighter">${av(a,'fr-av')}<div class="ff-flag" style="font-size:15px">${flag(a)}</div><div class="fr-name">${a?.nombre||'TBA'}</div><div class="fr-record">${rec(a)}</div></div>
      <div style="text-align:center"><div class="fr-vs">VS</div><span class="fr-weight">${p.peso_lbs||''} lbs</span></div>
      <div class="fr-fighter">${av(b,'fr-av')}<div class="ff-flag" style="font-size:15px">${flag(b)}</div><div class="fr-name">${b?.nombre||'TBA'}</div><div class="fr-record">${rec(b)}</div></div>
    </div></div></a>`;
  }

  function prelim(p) {
    const a = p.peleador1, b = p.peleador2;
    return `<a href="pelea.html?id=${p.id}" style="text-decoration:none;color:inherit;display:block;"><div class="prelim-row"><div class="prelim-inner">
      <div class="pr-fighter">${av(a,'pr-av')}<div class="ff-flag" style="font-size:13px">${flag(a)}</div><div class="pr-name">${a?.nombre||'TBA'}</div><div class="pr-record">${rec(a)}</div></div>
      <div style="text-align:center"><div class="pr-vs">VS</div><span class="pr-weight">${p.peso_lbs||''} lbs</span></div>
      <div class="pr-fighter">${av(b,'pr-av')}<div class="ff-flag" style="font-size:13px">${flag(b)}</div><div class="pr-name">${b?.nombre||'TBA'}</div><div class="pr-record">${rec(b)}</div></div>
    </div></div></a>`;
  }

  (async function(){
    const root = document.getElementById('cartelera-root');
    try {
      const { data: eventos } = await db.from('eventos').select('*').in('status', ['live','upcoming']).order('fecha').limit(1);
      const ev = eventos && eventos[0];
      if (!ev) {
        root.innerHTML = '<div style="padding:48px 24px;text-align:center;border:1px solid var(--border);background:var(--mid);color:var(--muted);text-transform:uppercase;letter-spacing:1px;">No hay ningún evento próximo programado.</div>';
        return;
      }
      document.title = ev.nombre + ' — Cartelera | FightMFL';
      const { data: peleas } = await db.from('peleas')
        .select('*, peleador1:peleador1_id(*), peleador2:peleador2_id(*)')
        .eq('evento_id', ev.id).order('orden');

      const lista = (peleas || []).slice().sort((x,y) => (PRIO[x.tipo]??9)-(PRIO[y.tipo]??9) || (x.orden||0)-(y.orden||0));
      const estelar = lista.find(p => p.tipo === 'estelar');
      const principales = lista.filter(p => p.tipo !== 'preliminar' && p !== estelar);
      const prelims = lista.filter(p => p.tipo === 'preliminar');

      const fechaFmt = ev.fecha ? new Date(ev.fecha+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '';
      const meta = [fechaFmt, ev.lugar, ev.canal].filter(Boolean).join(' · ');
      const main = estelar ? `${estelar.peleador1?.nombre||'TBA'} vs ${estelar.peleador2?.nombre||'TBA'}` : '';

      let html = `
      <div class="event-hero">
        <div class="event-hero-bg"></div>
        <div class="event-hero-pattern"></div>
        <div class="event-hero-overlay"></div>
        <div class="event-hero-content">
          <div class="eh-tag">${ev.status === 'live' ? 'En vivo' : 'Próximo evento'}</div>
          <div class="eh-title">${ev.nombre}</div>
          ${ev.subtitulo ? `<div class="eh-fight">${ev.subtitulo}</div>` : ''}
          ${main ? `<div class="eh-fight" style="color:var(--red)">${main}</div>` : ''}
          <div class="eh-meta">${meta}</div>
          <div class="eh-btns">
            ${ev.status === 'live' ? '<a href="evento-live.html" class="btn">Ver en vivo</a>' : '<a href="#" class="btn">Boletos</a>'}
          </div>
        </div>
      </div>`;

      if (!lista.length) {
        html += `<div style="padding:32px 24px;margin-top:20px;text-align:center;border:1px solid var(--border);background:var(--mid);color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Cartelera por anunciar</div>`;
      } else {
        html += `<div class="section-label" style="margin-top:24px">Cartelera Principal — ${ev.nombre}</div>`;
        if (estelar) html += featured(estelar);
        principales.forEach(p => { html += (p.tipo === 'coestelar') ? co(p) : row(p); });
        if (prelims.length) {
          html += `<div class="section-label" style="margin-top:24px">Preliminares</div>`;
          prelims.forEach(p => { html += prelim(p); });
        }
      }

      root.innerHTML = html;
    } catch(e) {
      console.error(e);
      root.innerHTML = '<div style="padding:24px;color:var(--muted)">Error cargando la cartelera.</div>';
    }
  })();
</script>

</body>
</html>
