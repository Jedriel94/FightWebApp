<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .news-hero { position:relative; margin:24px 0 0; min-height:420px; display:flex; align-items:flex-end; overflow:hidden; border:1px solid var(--border); cursor:pointer; text-decoration:none; color:var(--light); }
    .news-hero-bg { position:absolute; inset:0; background:linear-gradient(135deg,#1a0005,#0a0a0a); }
    .news-hero-bg img { width:100%; height:100%; object-fit:cover; object-position:center 15%; }
    .news-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.4) 50%,transparent 100%); z-index:1; }
    .news-hero-content { position:relative; z-index:2; padding:36px 40px; max-width:70%; }
    .news-hero-cat { display:inline-block; background:var(--red); font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:4px 12px; margin-bottom:16px; }
    .news-hero-title { font-family:'Anton',sans-serif; font-size:52px; line-height:1.05; letter-spacing:1px; margin-bottom:14px; }
    .news-hero-quote { font-size:15px; color:#ccc; line-height:1.6; border-left:3px solid var(--red); padding-left:16px; margin-bottom:16px; }
    .news-hero-meta { font-family:'Oswald',sans-serif; font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .filters { display:flex; gap:6px; margin:24px 0 16px; flex-wrap:wrap; }
    .filter-btn { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:6px 16px; border:1px solid var(--border); color:var(--muted); cursor:pointer; background:transparent; transition:all .2s; }
    .filter-btn:hover,.filter-btn.active { background:var(--red); border-color:var(--red); color:white; }
    .news-grid-main { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
    .ncard { background:var(--mid); border:1px solid var(--border); cursor:pointer; text-decoration:none; color:var(--light); display:block; transition:border-color .2s; overflow:hidden; }
    .ncard:hover { border-color:#333; }
    .ncard-img { height:160px; background:linear-gradient(135deg,#1a0005,#111); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .ncard-img img { width:100%; height:100%; object-fit:cover; object-position:center 15%; position:absolute; inset:0; }
    .ncard-img-pattern { position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(232,0,29,0.04) 20px,rgba(232,0,29,0.04) 40px); }
    .ncard-ph { font-family:'Anton',sans-serif; font-size:36px; color:rgba(232,0,29,0.2); position:relative; z-index:1; }
    .ncard-body { padding:16px 18px; }
    .ncard-cat { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:6px; }
    .ncard-title { font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; line-height:1.3; margin-bottom:8px; }
    .ncard-excerpt { font-size:13px; color:var(--muted); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .ncard-meta { font-family:'Oswald',sans-serif; font-size:11px; color:#444; text-transform:uppercase; letter-spacing:1px; margin-top:10px; }
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-icon { font-size:48px; margin-bottom:16px; }
    .empty-text { font-family:'Oswald',sans-serif; font-size:18px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    @media(max-width:768px){
      .news-hero{min-height:320px;}
      .news-hero-content{max-width:100%;padding:20px 16px 30px;}
      .news-hero-title{font-size:32px;}
      .news-grid-main{grid-template-columns:1fr;}
      .filters{gap:4px;}
      .filter-btn{font-size:10px;padding:5px 12px;}
    }
  </style>
</head>
<body>
<header style="background:#000000;border-bottom:1px solid #1E1E1E;position:sticky;top:0;z-index:200;">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <nav style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;"><img src="logo.svg" alt="FightMFL" style="height:30px;width:auto;display:block;"></a>
      <div id="nav-desktop" style="display:flex;gap:28px;">
        <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Inicio</a>
        <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Eventos</a>
        <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Peleadores</a>
        <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#fff;font-weight:700;text-decoration:none;">Noticias</a>
        <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888;text-decoration:none;">Tienda</a>
        <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;font-weight:700;">Quiero Pelear</a>
      </div>
      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;" onclick="toggleMenu()">
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
      </button>
    </nav>
  </div>
  <div id="mobile-menu" style="display:none;flex-direction:column;background:#000000;border-top:1px solid #1E1E1E;">
    <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Inicio</a>
    <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Eventos</a>
    <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Peleadores</a>
    <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#fff;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;border-left:3px solid #E8001D;">Noticias</a>
    <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Tienda</a>
    <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;font-weight:700;">Quiero Pelear</a>
  </div>
</header>
<style>@media(max-width:768px){#nav-desktop{display:none!important;}#hamburger-btn{display:flex!important;}}@media(min-width:769px){#mobile-menu{display:none!important;}}</style>
<script>function toggleMenu(){var m=document.getElementById('mobile-menu');m.style.display=m.style.display==='flex'?'none':'flex';m.style.flexDirection='column';}</script>

<div class="page">

  <!-- HERO NOTICIA DESTACADA -->
  <div id="hero-wrap"></div>

  <!-- FILTROS -->
  <div class="filters" id="filtros">
    <button class="filter-btn active" onclick="filtrar(null,this)">Todo</button>
    <button class="filter-btn" onclick="filtrar('Oficial',this)">Oficial</button>
    <button class="filter-btn" onclick="filtrar('Resultado',this)">Resultados</button>
    <button class="filter-btn" onclick="filtrar('Peleador',this)">Peleadores</button>
    <button class="filter-btn" onclick="filtrar('Declaración',this)">Declaraciones</button>
  </div>

  <!-- GRID -->
  <div class="news-grid-main" id="grid">
    <div style="grid-column:span 3;color:var(--muted);font-family:'Oswald',sans-serif;text-align:center;padding:40px;letter-spacing:1px;">Cargando noticias...</div>
  </div>

  <footer>
    <a class="footer-logo" href="index.html" style="display:inline-flex;align-items:center;"><img src="logo.svg" alt="FightMFL" style="height:22px;width:auto;display:block;"></a>
    <div class="footer-links"><a href="#">Instagram</a><a href="#">YouTube</a><a href="#">Contacto</a></div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
let todas = [], filtroActivo = null

function timeAgo(d) {
  const diff = Date.now() - new Date(d)
  const days = Math.floor(diff/86400000)
  if (days<=0) return 'Hoy'
  if (days===1) return 'Ayer'
  if (days<7) return `Hace ${days} días`
  return new Date(d).toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})
}

function filtrar(cat, btn) {
  filtroActivo = cat
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  renderGrid(cat ? todas.filter(n=>n.categoria===cat) : todas)
}

function renderHero(n) {
  if (!n) return
  document.getElementById('hero-wrap').innerHTML = `
  <a href="noticia.html?id=${n.id}" class="news-hero">
    <div class="news-hero-bg">
      ${n.imagen_url ? `<img src="${n.imagen_url}" alt="${n.titulo}">` : ''}
    </div>
    <div class="news-hero-overlay"></div>
    <div class="news-hero-content">
      <div class="news-hero-cat">${n.categoria||'MFL'}</div>
      <div class="news-hero-title">${n.titulo}</div>
      ${n.contenido ? `<div class="news-hero-quote">${n.contenido.substring(0,180)}${n.contenido.length>180?'...':''}</div>` : ''}
      <div class="news-hero-meta">${timeAgo(n.created_at)}</div>
    </div>
  </a>`
}

function renderGrid(lista) {
  const grid = document.getElementById('grid')
  if (!lista.length) {
    grid.innerHTML = `<div style="grid-column:span 3;" class="empty-state"><div class="empty-icon"></div><div class="empty-text">Sin noticias en esta categoría</div></div>`
    return
  }
  grid.innerHTML = lista.map(n => `
  <a href="noticia.html?id=${n.id}" class="ncard">
    <div class="ncard-img">
      ${n.imagen_url
        ? `<img src="${n.imagen_url}" alt="${n.titulo}">`
        : `<div class="ncard-img-pattern"></div><div class="ncard-ph">MFL</div>`}
    </div>
    <div class="ncard-body">
      <div class="ncard-cat">${n.categoria||'MFL'}</div>
      <div class="ncard-title">${n.titulo}</div>
      ${n.contenido ? `<div class="ncard-excerpt">${n.contenido}</div>` : ''}
      <div class="ncard-meta">${timeAgo(n.created_at)}</div>
    </div>
  </a>`).join('')
}

async function main() {
  const { data } = await db.from('noticias')
    .select('*').order('created_at', { ascending: false })
  todas = data || []

  if (!todas.length) {
    document.getElementById('hero-wrap').innerHTML = `<div class="empty-state"><div class="empty-icon"></div><div class="empty-text">Sin noticias publicadas aún</div></div>`
    document.getElementById('grid').innerHTML = ''
    return
  }

  renderHero(todas[0])
  renderGrid(todas.slice(1))
}

main()
</script>
</body>
</html>
