<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* BANNER PRÓXIMO EVENTO */
    .event-banner { position: relative; border: 1px solid var(--border); border-left: 3px solid var(--red); margin: 24px 0 0; padding: 40px; overflow: hidden; min-height: 280px; display: flex; align-items: flex-end; background: linear-gradient(135deg,#0A0A0A,#1a0005); }
    .banner-bg { position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(232,0,29,0.02) 40px,rgba(232,0,29,0.02) 80px); }
    .banner-accent { position: absolute; top: 0; right: 0; width: 40%; height: 100%; background: linear-gradient(to left, rgba(232,0,29,0.06), transparent); }
    .banner-content { position: relative; z-index: 2; width: 100%; }
    .banner-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
    .banner-title { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 1; letter-spacing: 2px; }
    .banner-title span { color: var(--red); }
    .banner-fight { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: #ccc; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
    .banner-meta { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 20px; border-left: 2px solid var(--red); padding-left: 10px; }
    .banner-btns { display: flex; gap: 10px; }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin: 28px 0 20px; }
    .tab { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 28px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
    .tab.active { color: white; border-bottom-color: var(--red); }
    .tab:hover:not(.active) { color: #ccc; }

    /* GRID DE EVENTOS */
    .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* TARJETA DE EVENTO */
    .event-card { background: var(--mid); border: 1px solid var(--border); cursor: pointer; text-decoration: none; color: var(--light); display: block; transition: border-color .2s; overflow: hidden; }
    .event-card:hover { border-color: #333; }
    .event-card.featured { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; }
    .event-card-img { background: linear-gradient(135deg, #1a0005, #0a0a0a); height: 160px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .event-card.featured .event-card-img { height: 100%; min-height: 200px; }
    .event-card-img-bg { position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(232,0,29,0.03) 30px,rgba(232,0,29,0.03) 60px); }
    .event-fighters { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .ef-avatar { width: 64px; height: 64px; border-radius: 50%; background: #1a1a1a; border: 2px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #444; }
    .event-card.featured .ef-avatar { width: 80px; height: 80px; font-size: 22px; }
    .ef-vs { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--red); }
    .event-card-info { padding: 16px 20px; }
    .event-card.featured .event-card-info { padding: 24px 28px; display: flex; flex-direction: column; justify-content: center; }
    .ec-num { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .ec-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; line-height: 1; }
    .event-card.featured .ec-name { font-size: 40px; }
    .ec-fight { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .event-card.featured .ec-fight { font-size: 18px; }
    .ec-meta { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
    .ec-btn { display: inline-block; margin-top: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); border-bottom: 1px solid rgba(232,0,29,0.3); padding-bottom: 2px; }

    /* PASADOS en lista */
    .past-list { display: flex; flex-direction: column; gap: 6px; }
    .past-item { background: var(--mid); border: 1px solid var(--border); border-left: 3px solid transparent; display: grid; grid-template-columns: 80px 1fr auto; align-items: center; gap: 20px; padding: 20px 24px; text-decoration: none; color: var(--light); transition: border-left-color .2s; }
    .past-item:hover { border-left-color: var(--red); }
    .past-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #1e1e1e; line-height: 1; }
    .past-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; }
    .past-fight { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--muted); margin-top: 3px; }
    .past-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .past-right { text-align: right; }
    .past-result { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .past-fights { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .check { color: var(--red); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>

  <style id="mobile-eventos">
  @media (max-width: 768px) {
    .shop-banner, .event-banner { padding: 20px 16px; }
    .banner-title { font-size: 44px; }
    .banner-fight { font-size: 16px; }
    .events-grid { grid-template-columns: 1fr; }
    .event-card.featured { grid-column: span 1; grid-template-columns: 1fr; }
    .event-card.featured .event-card-img { min-height: 160px; }
    .ec-name { font-size: 28px; }
    .event-card.featured .ec-name { font-size: 32px; }
    .past-item { grid-template-columns: 50px 1fr; gap: 10px; padding: 14px; }
    .past-right { display: none; }
    .past-name { font-size: 15px; }
    .past-fight { font-size: 12px; }
    .tabs { overflow-x: auto; }
  }
  </style>
</head>
<body>
<header style="background:#0D0F14;border-bottom:1px solid #232830;position:sticky;top:0;z-index:200;">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <nav style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;">
      <a href="index.html" style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:white;text-decoration:none;">FIGHT<span style="color:#E8001D;">MFL</span></a>
      <div id="nav-desktop" style="display:flex;gap:28px;">
        <a href="index.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Inicio</a>
        <a href="eventos.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#ffffff;text-decoration:none;font-weight:700;">Eventos</a>
        <a href="noticias.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Noticias</a>
        <a href="tienda.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Tienda</a>
      </div>
      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;" onclick="toggleMenu()">
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
      </button>
    </nav>
  </div>
  <div id="mobile-menu" style="display:none;flex-direction:column;background:#0D0F14;border-top:1px solid #232830;">
    <a href="index.html" style="font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #232830;display:block;">Inicio</a>
    <a href="eventos.html" style="font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;text-decoration:none;padding:18px 20px;border-bottom:1px solid #232830;display:block;border-left:3px solid #E8001D;">Eventos</a>
    <a href="noticias.html" style="font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #232830;display:block;">Noticias</a>
    <a href="tienda.html" style="font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #232830;display:block;">Tienda</a>
  </div>
</header>
<style>
@media(max-width:768px){
  #nav-desktop{display:none!important;}
  #hamburger-btn{display:flex!important;}
}
@media(min-width:769px){
  #mobile-menu{display:none!important;}
}
</style>
<script>
function toggleMenu(){
  var m=document.getElementById('mobile-menu');
  m.style.display=m.style.display==='flex'?'none':'flex';
  m.style.flexDirection='column';
}
</script>

<div class="page">




  <!-- BANNER PRÓXIMO -->
  <div class="event-banner" id="banner-proximo">
    <div class="banner-bg"></div>
    <div class="banner-accent"></div>
    <div class="banner-content">
      <div class="banner-tag" id="banner-tag">Próximo Evento</div>
      <div class="banner-title" id="banner-title">MFL <span id="banner-num">—</span></div>
      <div class="banner-fight" id="banner-fight">Cargando...</div>
      <div class="banner-meta" id="banner-meta"></div>
      <div class="banner-btns">
        <a href="evento-proximo.html" class="btn">Ver Cartelera</a>
        <a href="#" class="btn-ghost">Boletos</a>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('proximos')">Próximos</div>
    <div class="tab" onclick="switchTab('pasados')">Pasados</div>
  </div>

  <!-- PRÓXIMOS -->
  <div class="tab-content active" id="tab-proximos">
    <div class="events-grid" id="proximos-grid">
      <div style="grid-column:span 2;color:var(--muted);font-family:'Barlow Condensed',sans-serif;padding:20px;text-align:center;letter-spacing:1px;">Cargando eventos...</div>
    </div>
  </div>

  <!-- PASADOS -->
  <div class="tab-content" id="tab-pasados">
    <div class="past-list" id="pasados-list">
      <div style="color:var(--muted);font-family:'Barlow Condensed',sans-serif;padding:20px;text-align:center;letter-spacing:1px;">Cargando eventos pasados...</div>
    </div>
  </div>

  <footer>
    <a class="footer-logo" href="index.html">FIGHT<span>MFL</span></a>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">Contacto</a>
    </div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='proximos'&&i===0)||(tab==='pasados'&&i===1)));
    document.getElementById('tab-proximos').classList.toggle('active', tab==='proximos');
    document.getElementById('tab-pasados').classList.toggle('active', tab==='pasados');
  }

  function initiales(nombre) {
    return (nombre||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
  }

  async function loadEventos() {
    const { data: todos } = await db.from('eventos').select('*').order('fecha', { ascending: false })
    if (!todos) return

    const proximos = todos.filter(e => e.status === 'upcoming' || e.status === 'live')
    const pasados  = todos.filter(e => e.status === 'done')

    // Banner — primer upcoming/live
    const primero = proximos[0]
    if (primero) {
      const num = primero.nombre.replace(/[^0-9]/g,'')
      document.getElementById('banner-num').textContent = num || primero.nombre
      document.getElementById('banner-tag').textContent = primero.status === 'live' ? '🔴 EN VIVO' : 'Próximo Evento'
      const fechaStr = primero.fecha
        ? new Date(primero.fecha+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',year:'numeric'})
        : ''
      document.getElementById('banner-fight').textContent = primero.subtitulo || ''
      document.getElementById('banner-meta').textContent = `${fechaStr}${primero.lugar?' · '+primero.lugar:''}`
    }

    // Grid próximos
    const gridP = document.getElementById('proximos-grid')
    if (!proximos.length) {
      gridP.innerHTML = '<div style="grid-column:span 2;color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;padding:20px;text-align:center;letter-spacing:1px;">No hay eventos próximos.</div>'
    } else {
      gridP.innerHTML = proximos.map((ev, i) => {
        const featured = i === 0 ? ' featured' : ''
        return `
        <a href="evento-proximo.html" class="event-card${featured}">
          <div class="event-card-img">
            <div class="event-card-img-bg"></div>
            <div class="event-fighters">
              <div class="ef-avatar">??</div>
              <div class="ef-vs">VS</div>
              <div class="ef-avatar">??</div>
            </div>
          </div>
          <div class="event-card-info">
            <div class="ec-num">${ev.status==='live'?'🔴 EN VIVO':'⭐ Próximo'}</div>
            <div class="ec-name">${ev.nombre}</div>
            ${ev.subtitulo?`<div class="ec-fight">${ev.subtitulo}</div>`:''}
            <div class="ec-meta">${ev.fecha||''} · ${ev.lugar||''}</div>
            ${featured?'<div class="ec-btn">Ver cartelera completa →</div>':''}
          </div>
        </a>`
      }).join('')
    }

    // Lista pasados
    const listP = document.getElementById('pasados-list')
    if (!pasados.length) {
      listP.innerHTML = '<div style="color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;padding:20px;text-align:center;letter-spacing:1px;">Sin eventos pasados aún.</div>'
    } else {
      listP.innerHTML = pasados.map((ev, i) => `
        <a href="evento.html" class="past-item">
          <div class="past-num" style="font-family:'Bebas Neue',sans-serif;font-size:40px;color:#1e1e1e;">${String(pasados.length - i).padStart(2,'0')}</div>
          <div>
            <div class="past-name">${ev.nombre}${ev.subtitulo?' — '+ev.subtitulo:''}</div>
            <div class="past-meta">${ev.fecha||''} · ${ev.lugar||''}</div>
          </div>
          <div class="past-right">
            <div class="past-result"><span class="check">✓</span> Resultados</div>
          </div>
        </a>`).join('')
    }
  }

  loadEventos()
</script>




</body>
</html>
