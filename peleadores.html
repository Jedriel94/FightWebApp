<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peleadores | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .roster-header { background: linear-gradient(135deg,#0A0A0A,#1a0005); border: 1px solid var(--border); border-left: 3px solid var(--red); margin: 20px 0; padding: 24px 28px; }
    .roster-tag { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .roster-title { font-family: 'Unica One', sans-serif; font-size: 46px; letter-spacing: 2px; line-height: 1; }
    .roster-sub { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--muted); letter-spacing: 1px; margin-top: 8px; }

    .filtros { display: flex; gap: 6px; margin: 20px 0 18px; flex-wrap: wrap; }
    .filtro { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 7px 16px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; background: transparent; transition: all .2s; }
    .filtro:hover, .filtro.active { background: var(--red); border-color: var(--red); color: #fff; }

    .grid-peleadores { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .pcard { background: var(--mid); border: 1px solid var(--border); overflow: hidden; transition: border-color .2s; position: relative; }
    .pcard:hover { border-color: #333; }
    .pcard.signed { border-left: 3px solid var(--red); }
    .pcard-foto { position: relative; height: 240px; background: linear-gradient(160deg,#141414,#0a0a0a); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .pcard-foto img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; }
    .pcard-ini { font-family: 'Unica One', sans-serif; font-size: 46px; color: #262626; }
    .pcard-signed { position: absolute; top: 10px; right: 10px; background: var(--red); color: #fff; font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 2px; font-weight: 700; padding: 3px 9px; }
    .pcard-body { padding: 14px 16px; }
    .pcard-nombre { font-family: 'Unica One', sans-serif; font-size: 19px; text-transform: uppercase; line-height: 1.05; color: #fff; }
    .pcard-apodo { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--red); font-style: italic; margin-top: 3px; }
    .pcard-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .pcard-rec { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .pcard-rec div { flex: 1; text-align: center; }
    .pcard-rec-num { font-family: 'Unica One', sans-serif; font-size: 18px; line-height: 1; }
    .pcard-rec-lbl { font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 1px; color: #555; margin-top: 2px; }
    .pcard-cat { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #666; margin-top: 8px; }
    .vacio { text-align: center; padding: 60px 20px; font-family: 'Oswald', sans-serif; letter-spacing: 1px; color: var(--muted); }

    @media (max-width: 900px) { .grid-peleadores { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) {
      .grid-peleadores { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .roster-header { padding: 18px 16px; }
      .roster-title { font-size: 34px; }
      .pcard-foto { height: 170px; }
      .pcard-nombre { font-size: 14px; }
      .pcard-body { padding: 10px 12px; }
      .pcard-rec-num { font-size: 15px; }
    }
  </style>
</head>
<body>

<script>

<div class="page">
  <div class="roster-header">
    <div class="roster-tag">Roster Oficial</div>
    <div class="roster-title">PELEADORES</div>
    <div class="roster-sub" id="roster-sub">Atletas firmados con Mexico Fight League</div>
  </div>

  <div class="filtros" id="filtros"></div>
  <div class="grid-peleadores" id="grid">
    <div class="vacio" style="grid-column:1/-1">Cargando peleadores…</div>
  </div>

  <footer>
    <a class="footer-logo" href="index.html">FIGHT<span>MFL</span></a>
    <div class="footer-links"><a href="#">Instagram</a><a href="#">YouTube</a><a href="#">Contacto</a></div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  const ini = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  let todos = [], filtroActivo = 'firmados';

  function card(p){
    const foto = p.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nombre}" loading="lazy">`
      : `<div class="pcard-ini">${ini(p.nombre)}</div>`;
    const cat = (p.categoria||'').split('·')[0].trim();
    return `<div class="pcard${p.firmado?' signed':''}">
      <div class="pcard-foto">
        ${foto}
        ${p.firmado ? '<div class="pcard-signed">Signed</div>' : ''}
      </div>
      <div class="pcard-body">
        <div class="pcard-nombre">${p.nombre}</div>
        ${p.apodo ? `<div class="pcard-apodo">"${p.apodo}"</div>` : ''}
        <div class="pcard-meta"><span style="font-size:14px">${p.pais||'🏳️'}</span><span>${p.ciudad || ''}</span></div>
        <div class="pcard-rec">
          <div><div class="pcard-rec-num" style="color:#fff">${p.record_g}</div><div class="pcard-rec-lbl">Ganadas</div></div>
          <div><div class="pcard-rec-num" style="color:#777">${p.record_p}</div><div class="pcard-rec-lbl">Perdidas</div></div>
          <div><div class="pcard-rec-num" style="color:#555">${p.record_e}</div><div class="pcard-rec-lbl">Empates</div></div>
        </div>
        ${cat ? `<div class="pcard-cat">${cat}</div>` : ''}
      </div>
    </div>`;
  }

  function pintar(){
    const lista = filtroActivo === 'firmados'
      ? todos
      : todos.filter(p => (p.categoria||'').startsWith(filtroActivo));
    const grid = document.getElementById('grid');
    grid.innerHTML = lista.length
      ? lista.map(card).join('')
      : '<div class="vacio" style="grid-column:1/-1">Sin peleadores en esta categoría.</div>';
    document.getElementById('roster-sub').textContent =
      `${lista.length} atletas firmados con Mexico Fight League`;
  }

  function setFiltro(val, btn){
    filtroActivo = val;
    document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    pintar();
  }

  (async function(){
    // Solo el roster oficial: atletas firmados con MFL
    const { data } = await db.from('peleadores')
      .select('*').eq('firmado', true).order('nombre');
    todos = data || [];

    // Filtros por categoría de peso (dentro del roster)
    const cats = [...new Set(todos.map(p => (p.categoria||'').split('·')[0].trim()).filter(Boolean))].sort();
    const cont = document.getElementById('filtros');
    const mk = (txt, val, activo) => {
      const b = document.createElement('button');
      b.className = 'filtro' + (activo ? ' active' : '');
      b.textContent = txt;
      b.onclick = () => setFiltro(val, b);
      cont.appendChild(b);
    };
    mk('Todos', 'firmados', true);
    cats.forEach(c => mk(c, c, false));
    pintar();
  })();
</script>
  <script src="i18n.js"></script>
</body>
</html>
