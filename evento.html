<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFL 7 — Night of Champions | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .event-header { background: linear-gradient(135deg,#0A0A0A,#1a0005); border: 1px solid var(--border); border-left: 3px solid var(--red); margin: 20px 0; padding: 24px 28px; }
    .event-tag { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .event-title { font-family: 'Anton', sans-serif; font-size: 46px; letter-spacing: 2px; line-height: 1; }
    .event-subtitle { font-family: 'Oswald', sans-serif; font-size: 20px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
    .event-meta { font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 10px; }
    .event-meta span { color: #444; margin: 0 8px; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 20px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: white; border-bottom-color: var(--red); }

    /* ── Card de pelea estilo UFC (oscuro) ── */
    .uf-card { background: var(--mid); border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
    .uf-card.main { border-left: 3px solid var(--red); }
    .uf-top { display: grid; grid-template-columns: 150px 1fr 150px; align-items: stretch; }
    .uf-foto { position: relative; height: 200px; overflow: hidden; background: linear-gradient(160deg,#141414,#0a0a0a); display: flex; align-items: center; justify-content: center; }
    .uf-foto img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
    .uf-foto.perdio img { filter: grayscale(80%) brightness(.55); }
    .uf-sinfoto { font-family: 'Anton', sans-serif; font-size: 34px; color: #2a2a2a; }
    .uf-win { position: absolute; top: 10px; background: var(--red); color: #fff; font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; font-weight: 700; padding: 3px 10px; z-index: 2; }
    .uf-centro { padding: 20px 18px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
    .uf-tipo { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .uf-tipo.est { color: var(--red); }
    .uf-nombres { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 16px; }
    .uf-nombre { font-family: 'Anton', sans-serif; font-size: 21px; text-transform: uppercase; line-height: 1.05; color: #fff; }
    .uf-nombre.dim { color: #4a4a4a; }
    .uf-vs { font-family: 'Anton', sans-serif; font-size: 17px; color: var(--red); }
    .uf-datos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; text-align: center; }
    .uf-dl { font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #555; }
    .uf-dv { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 3px; }
    .uf-pie { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid var(--border); background: #0d0d0d; padding: 9px 16px; }
    .uf-pais { display: flex; align-items: center; gap: 8px; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .uf-pais.der { justify-content: flex-end; }
    .uf-rec { color: #fff; font-weight: 700; }
    /* Encabezado superior y datos al pie: solo en celular */
    .uf-tipo-top, .uf-datos-m { display: none; }

    @media (max-width: 768px) {
      /* Encabezado del tipo de pelea arriba, centrado */
      .uf-tipo-top { display: block; text-align: center; font-family: 'Oswald', sans-serif;
        font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--red);
        padding: 12px 10px 4px; }
      .uf-tipo { display: none; }              /* el del centro se oculta */

      .uf-top { grid-template-columns: 1fr 1.15fr 1fr; }
      .uf-foto { height: 190px; }
      .uf-centro { padding: 10px 4px; }

      /* Nombres apilados: uno arriba, VS, el otro abajo */
      .uf-nombres { grid-template-columns: 1fr; gap: 6px; margin-bottom: 0; }
      .uf-nombre { font-size: 15px; }
      .uf-vs { font-size: 13px; color: #888; }

      /* El bloque de datos del centro se oculta; va al pie */
      .uf-centro .uf-datos { display: none; }
      .uf-datos-m { display: grid; border-top: 1px solid var(--border);
        background: #0d0d0d; padding: 10px 12px; }

      /* Badge WIN abajo a la izquierda de la foto */
      .uf-win { top: auto; bottom: 0; left: 0 !important; right: auto !important; padding: 4px 12px; }

      .uf-pie { padding: 9px 12px; }
      .uf-pais { font-size: 9px; gap: 5px; }
      .uf-dv { font-size: 12px; }
    }
  </style>

  <style id="mobile-evento">
  @media (max-width: 768px) {
    .event-header { padding: 18px 16px; }
    .event-title { font-size: 36px; }
    .event-subtitle { font-size: 16px; }
    .fight-inner { padding: 12px 14px; }
    .fn-lg { font-size: 13px; }
    .fn-md { font-size: 12px; }
    .fn-sm { font-size: 11px; }
    .av-lg { width: 52px; height: 52px; font-size: 15px; }
    .av-md { width: 40px; height: 40px; font-size: 12px; }
    .result-bar { padding: 8px 14px; flex-wrap: wrap; gap: 8px; }
    .r-name { margin-left: 0; }
    .tabs { overflow-x: auto; }
  }
  </style>
</head>
<body>
<header style="background:#000000;border-bottom:1px solid #1E1E1E;position:sticky;top:0;z-index:200;">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <nav style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;"><img src="logo.svg" alt="FightMFL" style="height:30px;width:auto;display:block;"></a>
      <div id="nav-desktop" style="display:flex;gap:28px;">
        <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Inicio</a>
        <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#ffffff;text-decoration:none;font-weight:700;">Eventos</a>
        <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Peleadores</a>
        <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Noticias</a>
        <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Tienda</a>
        <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;font-weight:700;">Quiero Pelear</a>
      </div>
      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;" onclick="toggleMenu()">
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
      </button>
    </nav>
  </div>
  <div id="mobile-menu" style="display:none;flex-direction:column;background:#000000;border-top:1px solid #1E1E1E;">
    <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Inicio</a>
    <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;border-left:3px solid #E8001D;">Eventos</a>
    <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Peleadores</a>
    <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Noticias</a>
    <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Tienda</a>
    <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;font-weight:700;">Quiero Pelear</a>
  </div>
</header>
<style>
@media(max-width:768px){
  #nav-desktop{display:none!important;}
  #hamburger-btn{display:flex!important;}
}
@media(min-width:769px){
  #mobile-menu{display:none!important;}
}
</style>
<script>
function toggleMenu(){
  var m=document.getElementById('mobile-menu');
  m.style.display=m.style.display==='flex'?'none':'flex';
  m.style.flexDirection='column';
}
</script>

<div class="page">

  <!-- DETALLE DE EVENTO (DINÁMICO) -->
  <div id="evento-root" style="padding:24px 0;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:1px;">Cargando evento...</div>
  <footer>
    <a class="footer-logo" href="index.html" style="display:inline-flex;align-items:center;"><img src="logo.svg" alt="FightMFL" style="height:22px;width:auto;display:block;"></a>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">Contacto</a>
    </div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  const TIPO_LABEL = { estelar:'Pelea Estelar', coestelar:'Co-Estelar', principal:'Cartelera Principal', preliminar:'Preliminar' };
  const PRIO = { estelar:0, coestelar:1, principal:2, preliminar:3 };
  const ini = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const rec = p => p ? `${p.record_g}-${p.record_p}-${p.record_e}` : '—';
  function flag(p, size){ return `<div class="flag-${size}">${p?.pais || '🏳️'}</div>`; }
  function avatar(p, size, win){
    const cls = { lg:'av-lg', md:'av-md', sm:'av-sm' }[size] + (win ? ' w' : '');
    if (p && p.foto_url) return `<div class="${cls}" style="overflow:hidden;padding:0"><img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover" alt=""></div>`;
    return `<div class="${cls}">${ini(p && p.nombre)}</div>`;
  }
  // Nombre del país a partir del emoji de bandera
  const PAIS_TXT = {'🇲🇽':'México','🇻🇪':'Venezuela','🇦🇷':'Argentina','🇺🇸':'Estados Unidos','🇨🇴':'Colombia',
                    '🇧🇷':'Brasil','🇵🇪':'Perú','🇨🇱':'Chile','🇪🇨':'Ecuador','🇪🇸':'España'};

  // Un lado con foto grande + badge WIN si ganó
  function ufFoto(p, gano, perdio, lado){
    const img = p?.foto_url
      ? `<img src="${p.foto_url}" alt="${p.nombre||''}" loading="lazy">`
      : `<div class="uf-sinfoto">${ini(p?.nombre)}</div>`;
    const badge = gano ? `<div class="uf-win" style="${lado==='izq'?'left:10px':'right:10px'}">WIN</div>` : '';
    return `<div class="uf-foto${perdio?' perdio':''}">${img}${badge}</div>`;
  }

  function fightCard(p){
    const term = p.status === 'terminada';
    const a = p.peleador1, b = p.peleador2;
    const aWin = term && p.ganador_id === p.peleador1_id;
    const bWin = term && p.ganador_id === p.peleador2_id;
    const esEstelar = p.tipo === 'estelar';

    // Datos centrales: si terminó muestra el resultado, si no, los datos de la pelea
    const datos = term
      ? [['Asalto', p.round_final || '—'], ['Tiempo', p.tiempo || '—'], ['Método', p.metodo || '—']]
      : [['Peso', `${p.peso_lbs||'—'} lbs`], ['Rounds', p.rounds || 3], ['Estado', 'Por pelear']];

    const paisLado = (pel, der) => `
      <div class="uf-pais${der?' der':''}">
        <span style="font-size:14px">${pel?.pais || '🏳️'}</span>
        <span>${PAIS_TXT[pel?.pais] || ''}</span>
        <span class="uf-rec">${rec(pel)}</span>
      </div>`;

    const bloqueDatos = datos.map(([l,v]) => `<div><div class="uf-dl">${l}</div><div class="uf-dv">${v}</div></div>`).join('');
    const encabezado = `${TIPO_LABEL[p.tipo]||p.tipo} · ${p.peso_lbs||''} LBS · ${p.rounds||3} ROUNDS`;

    return `<div class="uf-card${esEstelar?' main':''}">
      <div class="uf-tipo-top${esEstelar?' est':''}">${encabezado}</div>
      <div class="uf-top">
        ${ufFoto(a, aWin, term && !aWin, 'izq')}
        <div class="uf-centro">
          <div class="uf-tipo${esEstelar?' est':''}">${encabezado}</div>
          <div class="uf-nombres">
            <div class="uf-nombre${term && !aWin ? ' dim':''}">${a?.nombre||'TBA'}</div>
            <div class="uf-vs">VS</div>
            <div class="uf-nombre${term && !bWin ? ' dim':''}">${b?.nombre||'TBA'}</div>
          </div>
          <div class="uf-datos">${bloqueDatos}</div>
        </div>
        ${ufFoto(b, bWin, term && !bWin, 'der')}
      </div>
      <div class="uf-pie">
        ${paisLado(a, false)}
        ${paisLado(b, true)}
      </div>
      <div class="uf-datos uf-datos-m">${bloqueDatos}</div>
    </div>`;
  }

  (async function(){
    const root = document.getElementById('evento-root');
    const id = new URLSearchParams(location.search).get('id');
    try {
      let ev;
      if (id) {
        ev = (await db.from('eventos').select('*').eq('id', id).single()).data;
      } else {
        const { data } = await db.from('eventos').select('*').order('fecha', { ascending: false }).limit(1);
        ev = data && data[0];
      }
      if (!ev) {
        root.innerHTML = '<div style="padding:48px 24px;text-align:center;border:1px solid var(--border);background:var(--mid);color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Evento no encontrado.</div>';
        return;
      }
      document.title = ev.nombre + ' | FightMFL';
      const { data: peleas } = await db.from('peleas')
        .select('*, peleador1:peleador1_id(*), peleador2:peleador2_id(*)')
        .eq('evento_id', ev.id).order('orden');
      const lista = (peleas || []).slice().sort((x,y) => (PRIO[x.tipo]??9)-(PRIO[y.tipo]??9) || (x.orden||0)-(y.orden||0));

      const fecha = ev.fecha ? new Date(ev.fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}) : '';
      const tag = ev.status === 'done' ? 'Evento Pasado · Resultados' : (ev.status === 'live' ? 'En Vivo' : 'Próximo Evento');
      const metaParts = [fecha, ev.lugar, ev.canal, lista.length ? `${lista.length} Peleas` : ''].filter(Boolean);
      const meta = metaParts.map(x => x).join(' · ');

      let html = `
      <div class="event-header">
        <div class="event-tag">${tag}</div>
        <div class="event-title">${ev.nombre}</div>
        ${ev.subtitulo ? `<div class="event-subtitle">${ev.subtitulo}</div>` : ''}
        <div class="event-meta">${meta}</div>
      </div>`;

      if (!lista.length) {
        html += `<div style="padding:32px 24px;margin-top:8px;text-align:center;border:1px solid var(--border);background:var(--mid);color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Cartelera por anunciar</div>`;
      } else {
        const estelares = lista.filter(p => p.tipo !== 'preliminar');
        const prelims = lista.filter(p => p.tipo === 'preliminar');
        html += `<div class="section-label" style="margin-top:8px">Cartelera Principal</div>`;
        estelares.forEach(p => { html += fightCard(p); });
        if (prelims.length) {
          html += `<div class="section-label" style="margin-top:20px">Preliminares</div>`;
          prelims.forEach(p => { html += fightCard(p); });
        }
      }
      root.innerHTML = html;
    } catch(e) {
      console.error(e);
      root.innerHTML = '<div style="padding:24px;color:var(--muted)">Error cargando el evento.</div>';
    }
  })();
</script>
</body>
</html>
