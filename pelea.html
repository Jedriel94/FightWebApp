<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reyes vs Torres | FightMFL</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* HERO PELEA */
    .fight-hero {
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      margin: 24px 0 0;
      border: 1px solid var(--border);
    }
    .fh-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0a0a0a, #1a0005); }
    .fh-pattern { position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(232,0,29,0.02) 40px,rgba(232,0,29,0.02) 80px); }

    /* SILUETAS */
    .fh-fighters { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: space-between; }
    .fh-left { display: flex; align-items: flex-end; padding-left: 40px; }
    .fh-right { display: flex; align-items: flex-end; padding-right: 40px; transform: scaleX(-1); }
    .fh-silhouette { width: 200px; height: 340px; opacity: 0.7; }

    /* OVERLAY */
    .fh-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(232,0,29,0.08) 0%, transparent 60%), linear-gradient(to bottom, transparent 30%, rgba(10,10,10,0.6) 100%); }

    /* CONTENIDO CENTRO */
    .fh-content { position: relative; z-index: 2; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 0 36px; }
    .fh-event { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .fh-weight { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
    .fh-names { display: flex; align-items: center; gap: 20px; }
    .fh-name { font-family: 'Unica One', sans-serif; font-size: 42px; letter-spacing: 1px; line-height: 1; }
    .fh-vs { font-family: 'Unica One', sans-serif; font-size: 28px; color: var(--red); }
    .fh-rounds { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

    /* LÍNEAS DE COLOR CORNER */
    .corner-line { position: absolute; top: 0; height: 3px; width: 48%; }
    .corner-line.red { left: 0; background: var(--red); }
    .corner-line.blue { right: 0; background: #1a6ef5; }

    /* TABS */
    .fight-tabs { display: flex; border-bottom: 1px solid var(--border); margin: 0 0 0; }
    .fight-tab { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 24px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
    .fight-tab.active { color: white; border-bottom-color: var(--red); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* COMPARATIVA */
    .comparison { background: var(--mid); border: 1px solid var(--border); margin-top: 20px; }
    .comp-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 28px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(232,0,29,0.05), transparent); }
    .comp-fighter-name { font-family: 'Unica One', sans-serif; font-size: 26px; letter-spacing: 1px; }
    .comp-fighter-name.right { text-align: right; color: #7ab3ff; }
    .comp-fighter-name.left { color: #ff6b6b; }
    .comp-center-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-align: center; }

    /* FILAS STATS */
    .stat-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--border); transition: background .2s; }
    .stat-row:last-child { border-bottom: none; }
    .stat-row:hover { background: #171717; }
    .stat-val { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; }
    .stat-val.red { color: #ff6b6b; }
    .stat-val.blue { color: #7ab3ff; text-align: right; }
    .stat-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; min-width: 120px; }

    /* BAR COMPARATIVA */
    .stat-bar-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 14px 28px; border-bottom: 1px solid var(--border); }
    .bar-val-left { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: #ff6b6b; text-align: right; min-width: 60px; }
    .bar-val-right { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: #7ab3ff; min-width: 60px; }
    .bar-wrap { flex: 1; display: flex; gap: 2px; height: 6px; }
    .bar-left { height: 6px; background: var(--red); border-radius: 3px 0 0 3px; transition: width .5s; }
    .bar-right { height: 6px; background: #1a6ef5; border-radius: 0 3px 3px 0; transition: width .5s; }
    .stat-bar-label { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 6px; }

    /* HISTORIAL */
    .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
    .history-card { background: var(--mid); border: 1px solid var(--border); padding: 20px; }
    .hc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .hc-av { width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; border: 2px solid rgba(232,0,29,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Unica One', sans-serif; font-size: 16px; color: #666; }
    .hc-av.blue { border-color: rgba(26,110,245,0.3); }
    .hc-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; }
    .hc-record { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .hc-fight { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .hc-fight:last-child { border-bottom: none; }
    .hc-result { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    .hc-result.w { color: #4CAF50; }
    .hc-result.l { color: var(--red); }
    .hc-opponent { font-family: 'Oswald', sans-serif; font-size: 13px; text-transform: uppercase; color: #aaa; }
    .hc-method { font-size: 11px; color: var(--muted); text-align: right; }

    /* REDES */
    .social-row { display: flex; justify-content: center; gap: 12px; margin-top: 6px; }
    .social-btn { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); padding: 5px 14px; text-decoration: none; transition: all .2s; }
    .social-btn:hover { border-color: #555; color: white; }

    @media(max-width:768px) {
      .fh-name { font-size: 26px; }
      .fh-silhouette { width: 120px; height: 200px; }
      .comp-header { padding: 14px 16px; }
      .comp-fighter-name { font-size: 18px; }
      .stat-row { padding: 12px 16px; gap: 8px; }
      .stat-val { font-size: 16px; }
      .stat-label { font-size: 10px; min-width: 80px; }
      .history-grid { grid-template-columns: 1fr; }
      .stat-bar-row { padding: 12px 16px; }
    }
  </style>
</head>
<body>
<header style="background:#000000;border-bottom:1px solid #1E1E1E;position:sticky;top:0;z-index:200;">
  <div style="max-width:1200px;margin:0 auto;padding:0 16px;">
    <nav style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;">
      <a href="index.html" style="display:flex;align-items:center;text-decoration:none;"><img src="logo.svg" alt="FightMFL" style="height:30px;width:auto;display:block;"></a>
      <div id="nav-desktop" style="display:flex;gap:28px;">
        <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Inicio</a>
        <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#ffffff;text-decoration:none;font-weight:700;">Eventos</a>
        <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Peleadores</a>
        <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Noticias</a>
        <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888888;text-decoration:none;">Tienda</a>
        <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;font-weight:700;">Quiero Pelear</a>
      </div>
      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:transparent;border:none;" onclick="toggleMenu()">
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
        <span style="width:24px;height:2px;background:white;display:block;"></span>
      </button>
    </nav>
  </div>
  <div id="mobile-menu" style="display:none;flex-direction:column;background:#000000;border-top:1px solid #1E1E1E;">
    <a href="index.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Inicio</a>
    <a href="eventos.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;border-left:3px solid #E8001D;">Eventos</a>
    <a href="peleadores.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Peleadores</a>
    <a href="noticias.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Noticias</a>
    <a href="tienda.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#666666;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;">Tienda</a>
    <a href="pelear.html" style="font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:#FF0A2A;text-decoration:none;padding:18px 20px;border-bottom:1px solid #1E1E1E;display:block;font-weight:700;">Quiero Pelear</a>
  </div>
</header>

<div class="page">

  <!-- DETALLE DE PELEA (DINÁMICO) -->
  <div id="pelea-root" style="padding:24px 0;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:1px;">Cargando pelea...</div>
  <footer>
    <a class="footer-logo" href="index.html" style="display:inline-flex;align-items:center;"><img src="logo.svg" alt="FightMFL" style="height:22px;width:auto;display:block;"></a>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
      <a href="#">Contacto</a>
    </div>
    <div class="footer-copy">© 2026 FightMFL</div>
  </footer>

</div>

<style>
@media(max-width:768px){
  #nav-desktop{display:none!important;}
  #hamburger-btn{display:flex!important;}
}
@media(min-width:769px){
  #mobile-menu{display:none!important;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
  function toggleMenu(){ var m=document.getElementById('mobile-menu'); m.style.display=m.style.display==='flex'?'none':'flex'; m.style.flexDirection='column'; }
  const TIPO_LABEL = { estelar:'Pelea Estelar', coestelar:'Co-Estelar', principal:'Cartelera Principal', preliminar:'Preliminar', tbd:'Por Anunciar' };
  const rec = p => p ? `${p.record_g}-${p.record_p}-${p.record_e}` : '—';
  const fl = p => (p && p.pais) || '🏳️';
  const statRow = (label, a, b) => `<div class="stat-row"><div class="stat-val red">${a}</div><div class="stat-label">${label}</div><div class="stat-val blue">${b}</div></div>`;

  (async function(){
    const root = document.getElementById('pelea-root');
    const id = new URLSearchParams(location.search).get('id');
    const noEncontrada = '<div style="padding:48px 24px;text-align:center;border:1px solid var(--border);background:var(--mid);color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Pelea no encontrada.</div>';
    if (!id) { root.innerHTML = noEncontrada; return; }
    try {
      const { data: p, error } = await db.from('peleas')
        .select('*, peleador1:peleador1_id(*), peleador2:peleador2_id(*), evento:evento_id(*)')
        .eq('id', id).single();
      if (error || !p) { root.innerHTML = noEncontrada; return; }
      const a = p.peleador1, b = p.peleador2, ev = p.evento;
      document.title = `${a?.nombre||'TBA'} vs ${b?.nombre||'TBA'} | FightMFL`;
      const fecha = ev?.fecha ? new Date(ev.fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}) : '';
      const heroMeta = [fecha, ev?.lugar].filter(Boolean).join(' · ');

      let resultado = '';
      if (p.status === 'terminada' && p.ganador_id) {
        const g = p.ganador_id === a?.id ? a : (p.ganador_id === b?.id ? b : null);
        resultado = `<div style="background:var(--mid);border:1px solid rgba(232,0,29,0.3);border-left:3px solid var(--red);padding:16px 28px;margin-bottom:6px;text-align:center;">
          <span style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);">Ganador</span>
          <div style="font-family:'Unica One',sans-serif;font-size:24px;margin-top:4px;">${g?.nombre||''}</div>
          <div style="font-family:'Oswald',sans-serif;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;">${p.metodo||''}${p.round_final?` · R${p.round_final}`:''}${p.tiempo?` · ${p.tiempo}`:''}</div>
        </div>`;
      }

      root.innerHTML = `
      <div class="fight-hero">
        <div class="fh-bg"></div><div class="fh-pattern"></div><div class="fh-overlay"></div>
        <div class="fh-content">
          <div class="fh-event">${ev?.nombre||''}${p.tipo?` · ${TIPO_LABEL[p.tipo]||p.tipo}`:''}${p.rounds?` · ${p.rounds} Rounds`:''}</div>
          <div class="fh-weight">${p.peso_lbs?`${p.peso_lbs} lbs`:''}</div>
          <div class="fh-names">
            <div class="fh-name" style="color:#ff6b6b">${a?.nombre||'TBA'}</div>
            <div class="fh-vs">VS</div>
            <div class="fh-name" style="color:#7ab3ff">${b?.nombre||'TBA'}</div>
          </div>
          <div class="fh-rounds">${heroMeta}</div>
        </div>
      </div>
      ${resultado}
      <div style="background:var(--mid);border:1px solid var(--border);margin-top:6px;">
        <div class="comp-header">
          <div class="comp-fighter-name left">${a?.nombre||'TBA'}</div>
          <div class="comp-center-label">Comparativa</div>
          <div class="comp-fighter-name right">${b?.nombre||'TBA'}</div>
        </div>
        ${statRow('Récord', rec(a), rec(b))}
        ${statRow('País', fl(a), fl(b))}
        ${statRow('Peso', a?.peso_lbs?`${a.peso_lbs} lbs`:'—', b?.peso_lbs?`${b.peso_lbs} lbs`:'—')}
        ${statRow('Alcance', a?.alcance||'—', b?.alcance||'—')}
        ${statRow('Apodo', a?.apodo?`"${a.apodo}"`:'—', b?.apodo?`"${b.apodo}"`:'—')}
      </div>`;
    } catch(e) { console.error(e); root.innerHTML = '<div style="padding:24px;color:var(--muted)">Error cargando la pelea.</div>'; }
  })();
</script>
</body>
</html>
